<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Football AI Assistant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="app-container">
    <aside class="prompting-sidebar">
      <div class="sidebar-header">
        <span class="flask-icon">⚽</span>
        <h2>Prompting Mode</h2>
      </div>
      
      <p class="prompting-desc">Choose how many tactical examples to inject into the AI context before your question:</p>
      
      <div class="radio-group">
        <label class="radio-option">
          <input type="radio" name="prompting-tech" value="zero-shot" checked>
          <span class="radio-dot"></span>
          <span class="radio-label">Zero-shot</span>
        </label>
        
        <label class="radio-option">
          <input type="radio" name="prompting-tech" value="one-shot">
          <span class="radio-dot"></span>
          <span class="radio-label">One-shot</span>
        </label>
        
        <label class="radio-option">
          <input type="radio" name="prompting-tech" value="few-shot">
          <span class="radio-dot"></span>
          <span class="radio-label">Few-shot</span>
        </label>
      </div>
      
      <div class="sidebar-footer">
        <p>Currently using: <strong id="current-mode-display">Zero-shot</strong></p>
      </div>
    </aside>

    <main class="chat-wrap">
      <header class="chat-header">
        <div>
          <h1>Football AI Assistant</h1>
          <span class="provider-badge">{{ provider }}</span>
        </div>
        <button id="reset-btn" title="Clear tactical conversation">Reset Pitch</button>
      </header>

      <div id="messages" class="messages"></div>

      <form id="chat-form" class="chat-form">
        <input id="user-input" type="text" placeholder="Ask about tactics, players, rules, or history..." autocomplete="off" required>
        <button type="submit">Send</button>
      </form>
    </main>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
